name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2

jobs:
  build-and-release:
    name: Build Signed Release & Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 -d > app/keystore.jks

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Verify APK Signature
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Rename APK with Version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/AutoDiagAI-v${VERSION}.apk

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-signed
          path: app/build/outputs/apk/release/AutoDiagAI-v*.apk
          retention-days: 30

      - name: Generate Changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "changelog=$(git log --pretty=format:'- %s' --no-merges)" >> $GITHUB_OUTPUT
          else
            echo "changelog=$(git log --pretty=format:'- %s' --no-merges ${PREVIOUS_TAG}..HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/AutoDiagAI-v*.apk
          body: |
            ## AutoDiagAI ${{ github.ref_name }}
            
            ### Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ### Installation
            Download the APK file and install it on your Android device.
            
            **Requirements:**
            - Android 8.0+ (API 26+)
            - Bluetooth 4.0+ for OBD2 connection
            
            ### Checksums
            ```
            ${{ hashFiles('app/build/outputs/apk/release/AutoDiagAI-v*.apk') }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keystore
        if: always()
        run: rm -f app/keystore.jks
